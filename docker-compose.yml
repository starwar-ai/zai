services:
  postgres:
    image: postgres:16-alpine
    container_name: zform-framework-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: zform
      POSTGRES_USER: zform
      POSTGRES_PASSWORD: zform_dev_password
      TZ: Asia/Shanghai
    ports:
      - "5433:5432"
    volumes:
      - zform_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U zform -d zform"]
      interval: 5s
      timeout: 3s
      retries: 10

volumes:
  zform_postgres_data:
